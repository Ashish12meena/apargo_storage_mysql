# ─── Media Upload & Validation ────────────────────────────────────────────────
media:
  service:
    incoming-enabled: true
    upload-path: ${MEDIA_UPLOAD_PATH:${user.home}/aigreentick/media-uploads}
    base-url: ${MEDIA_BASE_URL:http://localhost:7998/api/v1/media/}

    # Single file limit
    upload-max-size: 52428800     # 50 MB

    # Batch upload limits
    batch-max-files: 20
    batch-max-total-size: 104857600   # 100 MB
    batch-parallel-threads: 10

    # Allowed MIME types per category
    upload-allowed-image-types:
      - image/jpeg
      - image/jpg
      - image/png

    upload-allowed-video-types:
      - video/mp4
      - video/3gpp

    upload-allowed-document-types:
      - application/pdf
      - text/plain
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation

    upload-allowed-audio-types:
      - audio/mp4
      - audio/mpeg
      - audio/ogg
      - audio/aac
      - audio/amr

# ─── Storage Root & Temp Paths ────────────────────────────────────────────────
storage:
  root: ${STORAGE_ROOT_PATH:./media-uploads}
  temp-dir: ${STORAGE_TEMP_PATH:./media-uploads/temp}
  max-file-size: 524288000        # 500 MB absolute ceiling

# ─── Rate Limiting (Bucket4j) ────────────────────────────────────────────────
rate-limiting:
  enabled: ${RATE_LIMIT_ENABLED:true}
  default-capacity: 100
  default-refill-tokens: 100
  default-refill-duration: 1m
  endpoints:
    upload:
      capacity: 50
      refill-tokens: 50
      refill-duration: 1m
    get-media:
      capacity: 100
      refill-tokens: 100
      refill-duration: 1m