spring:
  profiles:
    include:
      - resilience       
      - database
      - media
      - eureka

  application:
    name: storage-service

  web:
    resources:
      add-mappings: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 200MB  

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:7998}

# Pagination
pagination:
  max-page-size: 100
  default-page-size: 20
  min-page-size: 1

# Scheduled Cleanup
file-cleanup:
  enabled: true
  temp-file-max-age-hours: 24
  cron: "0 0 2 * * ?"

# ─── Quota Reconciliation (nightly drift correction) 
quota:
  reconciliation:
    enabled: true
    cron: "0 0 3 * * ?"

# Logging
logging:
  level:
    com.aigreentick.services.storage: DEBUG

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: info,health,metrics,prometheus,env,beans,loggers
  endpoint:
    health:
      show-details: always


# ─── App Info ─────────────────────────────────────────────────────────────────
info:
  app:
    name: Storage Service
    version: '@project.version@'
    description: Handles file storage and media management for Aigreentick
  author:
    name: Ashish Meena
    organization: Aigreentick


# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  packages-to-scan: com.aigreentick.services.storage.controller



# ─── Storage Providers ────────────────────────────────────────────────────────
storage:
  active-provider: ${STORAGE_PROVIDER:local}

  providers:
    local:
      enabled: true
      root-path: ${LOCAL_STORAGE_ROOT:./media-uploads}
      base-url: ${LOCAL_STORAGE_BASE_URL:http://localhost:7998/api/v1/media/serve/}

    s3:
      enabled: ${S3_ENABLED:false}
      bucket: ${S3_BUCKET:aigreentick-media}
      region: ${S3_REGION:ap-south-1}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      use-iam-role: ${S3_USE_IAM:false}
      multipart-threshold-bytes: 104857600    # 100 MB
      presigned-url-expiry-minutes: 15


